name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package release assets
        run: |
          mkdir -p release-assets
          # Create a clean source tarball excluding build artifacts
          git archive --format=tar.gz --prefix=captua/ HEAD > release-assets/captua-source.tar.gz
          # Include the install script separately for convenience
          cp scripts/install.sh release-assets/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/captua-source.tar.gz
            release-assets/install.sh
          generate_release_notes: true
